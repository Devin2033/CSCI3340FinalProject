<!--
login.html file

-Login page for returning users.
-Contains a form that submits a POST request
 to the login view in views.py which checks if the user
 is in the database.
-Displays error messages if the username or password is incorrect.
-Redirects to the homepage if login is successful
-Includes a link to register.html for new users
-->

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTRedd - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'socialAppApp/auth.css' %}">
</head>
<body>
    <div class="auth-card">
        <div class="brand-logo">UTRedd</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-desc">Connect with students, share knowledge, grow together.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" name="username" class="auth-input" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" class="auth-input" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-auth">Log In</button>
        </form>

        <div class="auth-switch">
            Don't have an account? <a href="{% url 'register' %}">Sign up</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
