{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post · UTRedd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'socialAppApp/styles.css' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'socialAppApp/favicon.svg' %}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold brand-text" href="{% url 'homepage' %}">UTRedd</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'homepage' %}"><i class="bi bi-house-door"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'communities' %}"><i class="bi bi-people"></i> Communities</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'saved_posts' %}"><i class="bi bi-bookmark"></i> Saved</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4" style="max-width: 760px;">

        <a href="{% url 'post_detail' post.pk %}" class="d-inline-flex align-items-center gap-1 text-muted mb-4 text-decoration-none"
           style="font-size:0.875rem;">
            <i class="bi bi-arrow-left"></i> Back to Post
        </a>

        <h1 class="fw-bold mb-4">Edit Post</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="bg-white border rounded-3 p-4" style="border-color:#e5e7eb !important;">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium">Category</label>
                    <select name="category" class="form-select" required>
                        <option value="internship" {% if post.category == 'internship' %}selected{% endif %}>Internship</option>
                        <option value="event"      {% if post.category == 'event' %}selected{% endif %}>Event</option>
                        <option value="rating"     {% if post.category == 'rating' %}selected{% endif %}>Prof Rating</option>
                        <option value="question"   {% if post.category == 'question' %}selected{% endif %}>Question</option>
                        <option value="general"    {% if post.category == 'general' %}selected{% endif %}>General</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Title</label>
                    <input type="text" name="title" class="form-control" value="{{ post.title }}" maxlength="300" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Body</label>
                    <textarea name="body" class="form-control" rows="6" required>{{ post.body }}</textarea>
                </div>
                <div class="d-flex gap-2 justify-content-end">
                    <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-dark px-4">Save Changes</button>
                </div>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
