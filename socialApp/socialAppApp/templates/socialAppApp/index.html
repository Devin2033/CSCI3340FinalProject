<!--
index.html file

-Main homepage information. Requires user to be logged in.
-Contains the navbar with website title, navigation links
todo list button, logout button, and profile icon
-The welcome message displays the users fist name
-Post feed will get added dynamically by script.js
-->

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTRedd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'socialAppApp/styles.css' %}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold brand-text" href="#">UTRedd</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'homepage' %}"><i class="bi bi-house-door"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="bi bi-people"></i> Communities</a>
                    </li>
                    <!-- <li class="nav-item">
                        <a class="nav-link" href="{%url 'quote_of_the_day'%}">Quote of the Day</a>
                    </li> -->
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-secondary todo-btn" id="todoBtn">
                        <i class="bi bi-check2-square"></i> Todo List
                    </button>
                    <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                    <!-- <a href="#" class="profile-link"> -->
                        <a href="#" class="profile-link d-flex align-items-center justify-content-center" style="width:40px;height:40px;border-radius:50%;border:2px solid #e5e7eb;background:#f3f4f6;">
                            <i class="bi bi-person" style="font-size:1.2rem;color:#6b7280;"></i>
                        </a>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4" style="max-width: 760px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold mb-0">Welcome, {{ request.user.first_name }} 👋</h1>
            <button class="btn btn-dark btn-create" id="createPostBtn">
                <i class="bi bi-plus-lg"></i> Create Post
            </button>
        </div>

        <div class="quote-card shadow-sm">
            <p class="quote-text">"{{ quote }}"</p>
            <div class="quote-author">{{ author }}</div>
        </div>

        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
            <select class="form-select form-select-sm community-filter" id="communityFilter">
                <option value="all">All Communities</option>
                <option value="cs">Computer Science</option>
                <option value="business">Business</option>
                <option value="engineering">Engineering</option>
                <option value="biology">Biology</option>
            </select>

            <div class="sort-group btn-group" role="group">
                <button class="btn btn-sort active" data-sort="hot">🔥 Hot</button>
                <button class="btn btn-sort" data-sort="new">✨ New</button>
                <button class="btn btn-sort" data-sort="top">⬆️ Top</button>
            </div>
        </div>

        <div id="postsFeed"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'socialAppApp/script.js' %}"></script>
</body>
</html>
